<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tribunus — Multi-Agent Orchestration</title>
    <meta name="description" content="Tribunus orchestrates multi-agent AI workflows with mission timelines, public intake, and a read-only codex browser." />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#1e1e2e" />
    <meta property="og:title" content="Tribunus" />
    <meta property="og:description" content="Multi-agent orchestration with mission planning, public intake, and collaborative coding." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%236366f1'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='48' font-weight='bold' fill='white' font-family='system-ui'%3ET%3C/text%3E%3C/svg%3E" />
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      :root{--c-primary:#6366f1;--c-secondary:#8b5cf6;--c-accent:#06b6d4;--c-success:#22c55e;--c-warning:#f59e0b;--c-error:#ef4444;--c-surface:#1e1e2e;--c-surface-alt:#2a2a3e;--c-surface-card:#252538;--c-text:#e2e8f0;--c-text-muted:#94a3b8;--c-text-weak:#64748b;--c-border:#3a3a4e;--c-border-light:#32324a;--radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--shadow-card:0 4px 6px -1px rgba(0,0,0,0.3),0 2px 4px -2px rgba(0,0,0,0.2);--shadow-lg:0 10px 15px -3px rgba(0,0,0,0.3),0 4px 6px -4px rgba(0,0,0,0.2);--font-sans:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--font-mono:'JetBrainsMono Nerd Font Mono','Fira Code',monospace}
      html{background:var(--c-surface);color:var(--c-text);font-family:var(--font-sans);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      body{min-height:100dvh;overflow-x:hidden}
      a{color:var(--c-primary);text-decoration:none;transition:color .15s}
      a:hover{color:var(--c-secondary)}
      ::selection{background:rgba(99,102,241,0.3);color:var(--c-text)}
      /* Loading skeleton */
      .app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:1rem;padding:2rem}
      .app-loading-logo{width:56px;height:56px;border-radius:var(--radius-lg);background:var(--c-primary);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;animation:pulse 2s ease-in-out infinite}
      .app-loading-text{color:var(--c-text-muted);font-size:0.875rem}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
    </style>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {
            // SW registration failure is non-critical
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-logo">T</div>
        <div class="app-loading-text">Loading Tribunus…</div>
      </div>
    </div>
    <script type="module" src="./public-mode.ts"></script>
  </body>
</html>
