[package]
name = "tribunus-compute-native"
version = "0.1.0"
edition = "2021"
description = "Tribunus Compute Kernel — native MLX backend via napi-rs"
license = "AGPL-3.0-only"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "tribunus-coreml-decode-attribution"
path = "src/bin/tribunus-coreml-decode-attribution.rs"

[[bin]]
name = "tribunus-compute-worker"
path = "src/bin/tribunus-compute-worker.rs"

[[bin]]
name = "tribunus-fake-worker"
path = "src/bin/tribunus-fake-worker.rs"

[[bin]]
name = "tribunus-compute-image"
path = "src/bin/tribunus-compute-image.rs"

[[bin]]
name = "tribunus-native-bench"
path = "src/bin/tribunus-native-bench.rs"

[[test]]
name = "treatment_qualification"
path = "tests/treatment_qualification.rs"

[[test]]
name = "treatment_lifecycle"
path = "tests/treatment_lifecycle.rs"

[[test]]
name = "backend_conformance"
path = "tests/backend_conformance.rs"

[[test]]
name = "lane_conformance"
path = "tests/lane_conformance.rs"

[[test]]
name = "heterogeneous_conformance"
path = "tests/heterogeneous_conformance.rs"

[[test]]
name = "evaluation_authority"
path = "tests/evaluation_authority.rs"

[[test]]
name = "accelerate_qualification"
path = "tests/accelerate_qualification.rs"

[[test]]
name = "mlx_accelerate_smoke"
path = "tests/mlx_accelerate_smoke.rs"

[[test]]
name = "coreml_lifecycle"
path = "tests/coreml_lifecycle.rs"

[dependencies]
napi = { version = "3.9.0", features = ["napi8", "serde-json"], default-features = false }
napi-derive = "3.5.6"
mlx-rs = { path = "/Users/user/Developer/GitHub/Tribunus Compute/mlx-rs-fork/mlx-rs", features = ["metal", "accelerate", "safetensors"] }
mlx-sys = { path = "/Users/user/Developer/GitHub/Tribunus Compute/mlx-rs-fork/mlx-sys" }
safetensors = "0.5"
sha2 = { version = "0.10", features = ["asm"] }
uuid = { version = "1", features = ["v4", "serde"] }
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
tribunus-evidence-schema = { path = "../compute-evidence-native/crates/evidence-schema" }
libc = "0.2"
lazy_static = "1.5"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time", "macros"] }
async-trait = "0.1"
coreml-proto = "0.1.0"
prost = "0.14.4"
prost-types = "0.14.4"
tempfile = "3"
[build-dependencies]
napi-build = "2.3.2"
cc = "1.2"

[features]
private-development = []

[profile.release]
strip = "symbols"
lto = true
codegen-units = 1

[profile.dev]
opt-level = 3

[profile.test]
opt-level = 3

[profile.image-build]
inherits = "release"
opt-level = 3
lto = true
codegen-units = 1
incremental = false
debug = false
debug-assertions = false
overflow-checks = false
strip = "symbols"
[profile.inference-research]
inherits = "release"
opt-level = 3
debug = "line-tables-only"
split-debuginfo = "unpacked"
strip = "none"
debug-assertions = false
overflow-checks = false
lto = "thin"
codegen-units = 16
incremental = true
panic = "unwind"

[profile.inference-debug]
inherits = "release"
opt-level = 3
debug = "full"
split-debuginfo = "unpacked"
strip = "none"
debug-assertions = false
overflow-checks = true
lto = "off"
codegen-units = 16
incremental = true
panic = "unwind"

[profile.inference-evidence]
inherits = "release"
opt-level = 3
debug = "line-tables-only"
split-debuginfo = "unpacked"
strip = "none"
debug-assertions = false
overflow-checks = false
lto = "thin"
codegen-units = 8
incremental = false
panic = "unwind"

[profile.inference-evidence-fat]
inherits = "inference-evidence"
lto = "fat"
codegen-units = 1
incremental = false
[[test]]
name = "f32_contract_tests"
path = "tests/f32_contract_tests.rs"

[[test]]
name = "three_backend_conformance"
path = "tests/three_backend_conformance.rs"

